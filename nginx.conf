# NGINX Reverse Proxy Configuration
# For same-domain deployment: Admin Portal + MyChart Patient Portal + Backend (Spring Boot)
#
# URLs:
# - Admin Portal: https://app.yourdomain.com/ (root)
# - MyChart Portal: https://app.yourdomain.com/mychart/
# - Backend API: https://app.yourdomain.com/api
#
# Build outputs (from repository root):
# - Admin: frontend/dist/preclinic-frontend/ -> /var/www/app/admin/
# - MyChart: mychart/mychart-ui/dist/mychart-ui/ -> /var/www/app/mychart/
#
# Deploy commands:
#   sudo mkdir -p /var/www/app/admin /var/www/app/mychart
#   sudo cp -r frontend/dist/preclinic-frontend/* /var/www/app/admin/
#   sudo cp -r mychart/mychart-ui/dist/mychart-ui/* /var/www/app/mychart/
#   sudo chown -R www-data:www-data /var/www/app/admin /var/www/app/mychart
#   sudo chmod -R 755 /var/www/app/admin /var/www/app/mychart
#
# Note: This configuration assumes same-domain reverse proxy for cookie-based authentication.
# If using separate domains, update cookie SameSite settings and CORS configuration.

# WebSocket upgrade mapping (required if using WebSockets)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# HTTP server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.yourdomain.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server - Main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.yourdomain.com;

    # SSL Configuration (update paths to your certificates)
    ssl_certificate /etc/ssl/certs/yourdomain.com.crt;
    ssl_certificate_key /etc/ssl/private/yourdomain.com.key;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upload size limit
    client_max_body_size 25m;

    # Root directory for Admin Portal (default)
    root /var/www/app/admin;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Logging
    access_log /var/log/nginx/app.yourdomain.com.access.log;
    error_log /var/log/nginx/app.yourdomain.com.error.log;

    # Security Headers (applied to all responses)
    # HSTS: Only enable on HTTPS (already in HTTPS server block)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API Proxy - Forward /api/* to Spring Boot backend (localhost:8087)
    # Must come BEFORE location / to match API requests first
    # No trailing slash in proxy_pass to preserve /api/ prefix in request
    location /api/ {
        proxy_pass http://localhost:8087;
        proxy_http_version 1.1;
        
        # Essential proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Server $host;
        
        # WebSocket support (Connection upgrade)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings (disable for streaming/real-time)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Explicitly forward Set-Cookie headers from backend
        proxy_pass_header Set-Cookie;
        
        # Don't pass through errors to client
        proxy_intercept_errors off;
    }

    # Static assets with long-term caching (JS, CSS, images, fonts)
    # Angular build includes content hashes in filenames, so safe to cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # MyChart Patient Portal - Served at /mychart/
    # Use ^~ so this prefix wins over regex locations (prevents 404 on /mychart/*.js)
    location ^~ /mychart/ {
        alias /var/www/app/mychart/;
        index index.html;

        # SPA routing
        try_files $uri $uri/ /mychart/index.html;

        # Cache everything here by default (index.html overridden below)
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Security headers for HTML pages
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # MyChart index.html - NO cache (must be server-level, not nested)
    location = /mychart/index.html {
        alias /var/www/app/mychart/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Admin Portal index.html - no cache (to allow app updates)
    # This ensures users get the latest version when app is redeployed
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Admin Portal SPA Routing - Fallback to index.html for all non-API, non-MyChart routes
    # Supports /admin/*, /patient/*, and all other Admin Angular routes
    # Must come AFTER /api and /mychart/ location blocks
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers for HTML pages
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Health check endpoint (optional, for monitoring)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
