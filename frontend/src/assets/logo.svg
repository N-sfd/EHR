<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hospitalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004F4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2EC8A7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hospital Building -->
  <rect x="30" y="40" width="60" height="50" fill="url(#hospitalGrad)" rx="4"/>
  
  <!-- Cross Symbol -->
  <rect x="55" y="50" width="10" height="30" fill="white" rx="2"/>
  <rect x="50" y="60" width="20" height="10" fill="white" rx="2"/>
  
  <!-- Medical Plus Sign (Alternative) -->
  <circle cx="60" cy="30" r="8" fill="url(#hospitalGrad)"/>
  <rect x="57" y="25" width="6" height="10" fill="white" rx="1"/>
  <rect x="54" y="28" width="12" height="6" fill="white" rx="1"/>
  
  <!-- Heart Symbol -->
  <path d="M 60 100 Q 50 90, 45 85 Q 40 80, 45 75 Q 50 70, 60 80 Q 70 70, 75 75 Q 80 80, 75 85 Q 70 90, 60 100" 
        fill="#E16464" 
        opacity="0.8"/>
</svg>
