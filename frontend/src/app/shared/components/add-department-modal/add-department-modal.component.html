<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Add Department</h3>
      <button class="modal-close" (click)="closeModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
      <div class="alert alert-error" *ngIf="errorMessage" style="margin-bottom: 1rem; background-color: #fee; border: 1px solid #fcc; padding: 0.75rem; border-radius: 4px;">
        <i class="fas fa-exclamation-circle"></i>
        {{ errorMessage }}
      </div>
      <form [formGroup]="form" (ngSubmit)="onSubmit($event)">
        <div class="form-group" style="margin-bottom: 1rem;">
          <label class="required-label" style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Department Name <span style="color: red;">*</span></label>
          <input type="text" formControlName="name" class="form-control" 
                 placeholder="Enter department name (e.g., Cardiology, OPD)"
                 [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
                 (blur)="form.get('name')?.markAsTouched()"
                 autofocus
                 required />
          <div class="invalid-feedback" *ngIf="form.get('name')?.invalid && form.get('name')?.touched" style="display: block; color: #dc3545; font-size: 0.875rem; margin-top: 0.25rem;">
            Department name is required.
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea formControlName="description" class="form-control" rows="3" placeholder="Optional description"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="isSaving || !form.get('name')?.value?.trim() || form.get('name')?.invalid">
            <i class="fas fa-save"></i> {{ isSaving ? 'Saving...' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
