<div class="drawer-backdrop" *ngIf="isOpen" (click)="onBackdropClick()">
  <div class="drawer-panel" (click)="onDrawerClick($event)">
    <div class="drawer-header">
      <h2>Admin Profile</h2>
      <button class="close-btn" (click)="cancel()" aria-label="Close drawer">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="drawer-content" [formGroup]="profileForm">
      <!-- Avatar Upload -->
      <div class="form-section">
        <label class="form-label">Profile Picture</label>
        <div class="avatar-upload">
          <div class="avatar-preview">
            <img *ngIf="profileForm.get('avatarUrl')?.value" 
                 [src]="profileForm.get('avatarUrl')?.value" 
                 alt="Avatar">
            <div *ngIf="!profileForm.get('avatarUrl')?.value" class="avatar-placeholder">
              {{ (profileForm.get('fullName')?.value || 'A').charAt(0).toUpperCase() }}
            </div>
          </div>
          <label class="upload-btn">
            <input type="file" accept="image/*" (change)="onAvatarSelected($event)" hidden>
            <i class="fas fa-camera"></i>
            <span>Upload Photo</span>
          </label>
        </div>
      </div>

      <!-- Full Name -->
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name *</label>
        <input 
          type="text" 
          id="fullName"
          formControlName="fullName"
          class="form-input"
          [class.error]="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched">
        <div class="error-message" *ngIf="profileForm.get('fullName')?.invalid && profileForm.get('fullName')?.touched">
          Full name is required
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email *</label>
        <input 
          type="email" 
          id="email"
          formControlName="email"
          class="form-input"
          [class.error]="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
        <div class="error-message" *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
          <span *ngIf="profileForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="profileForm.get('email')?.errors?.['email']">Invalid email format</span>
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label class="form-label" for="phone">Phone</label>
        <input 
          type="tel" 
          id="phone"
          formControlName="phone"
          class="form-input">
      </div>

      <!-- Role -->
      <div class="form-group">
        <label class="form-label" for="role">Role *</label>
        <select 
          id="role"
          formControlName="role"
          class="form-select"
          [class.error]="profileForm.get('role')?.invalid && profileForm.get('role')?.touched">
          <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
        </select>
      </div>

      <!-- Working Days -->
      <div class="form-section">
        <label class="form-label">Working Days *</label>
        <div class="working-days">
          <button 
            *ngFor="let day of dayLabels; let i = index"
            type="button"
            class="day-btn"
            [class.active]="isWorkingDay(i)"
            (click)="toggleWorkingDay(i)">
            {{ day }}
          </button>
        </div>
      </div>

      <!-- Working Hours -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="startHour">Start Hour *</label>
          <input 
            type="time" 
            id="startHour"
            formControlName="startHour"
            class="form-input"
            [class.error]="profileForm.get('startHour')?.invalid && profileForm.get('startHour')?.touched">
        </div>
        <div class="form-group">
          <label class="form-label" for="endHour">End Hour *</label>
          <input 
            type="time" 
            id="endHour"
            formControlName="endHour"
            class="form-input"
            [class.error]="profileForm.get('endHour')?.invalid && profileForm.get('endHour')?.touched">
        </div>
      </div>

      <!-- Week Start -->
      <div class="form-group">
        <label class="form-label" for="weekStart">Week Starts On *</label>
        <select 
          id="weekStart"
          formControlName="weekStart"
          class="form-select"
          [class.error]="profileForm.get('weekStart')?.invalid && profileForm.get('weekStart')?.touched">
          <option *ngFor="let option of weekStartOptions" [value]="option.value">{{ option.label }}</option>
        </select>
      </div>
    </div>

    <div class="drawer-footer">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="save()">Save</button>
    </div>
  </div>
</div>
