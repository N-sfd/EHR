<header class="header">
  <div class="header-top">
    <div class="header-left">
      <button class="menu-toggle-btn" (click)="onToggleSidebar()" title="Toggle sidebar menu" aria-label="Toggle sidebar menu">
        <i class="fas fa-bars"></i>
      </button>
      <div class="header-title-section">
        <h1 class="header-title">Hospital Management System</h1>
        <p class="header-subtitle">Manage all aspects of your hospital operations</p>
      </div>
      <div class="header-search">
        <i class="fas fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Search">
      </div>
    </div>

    <div class="header-right">
      <div class="notification">
        <i class="fas fa-bell"></i>
      </div>

      <div class="user-chip">
        <img src="https://i.pravatar.cc/80?img=5" alt="Jimmy Anderson">
      </div>
    </div>
  </div>
</header>
