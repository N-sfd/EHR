<div class="guarantor-page">
  <app-card title="Guarantor Information">
    <div class="guarantor-details" *ngIf="!isLoading && guarantor">
      <div class="detail-row">
        <span class="detail-label">Name:</span>
        <span class="detail-value">{{ guarantor.firstName }} {{ guarantor.lastName }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Relationship:</span>
        <span class="detail-value">{{ guarantor.relationship }}</span>
      </div>
      <div class="detail-row" *ngIf="guarantor.phone">
        <span class="detail-label">Phone:</span>
        <span class="detail-value">{{ guarantor.phone }}</span>
      </div>
      <div class="detail-row" *ngIf="guarantor.email">
        <span class="detail-label">Email:</span>
        <span class="detail-value">{{ guarantor.email }}</span>
      </div>
      <div class="detail-row" *ngIf="guarantor.address">
        <span class="detail-label">Address:</span>
        <span class="detail-value">{{ guarantor.address }}</span>
      </div>
    </div>
    <div class="empty-state" *ngIf="!isLoading && !guarantor">
      <p>No guarantor information on file.</p>
    </div>
    <div class="loading-state" *ngIf="isLoading">
      <p>Loading guarantor information...</p>
    </div>
  </app-card>
</div>
