<div class="demographics-page">
  <!-- Inline Warnings -->
  <div class="warnings-area" *ngIf="eligibilityWarning || requiredFieldsWarning">
    <app-alert-banner
      *ngIf="eligibilityWarning"
      type="warning"
      message="Insurance eligibility not verified. Please verify coverage before scheduling appointments."
    ></app-alert-banner>
    <app-alert-banner
      *ngIf="requiredFieldsWarning"
      type="error"
      message="Please complete all required fields marked with *"
    ></app-alert-banner>
  </div>

  <!-- Identity Section -->
  <app-section-header
    title="Identity"
    [collapsible]="true"
    [(collapsed)]="identityCollapsed"
    icon="fas fa-id-card"
  ></app-section-header>
  
  <div class="form-section" *ngIf="!identityCollapsed">
    <form [formGroup]="demographicsForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="legalName" class="field-label">
            Legal Name <span class="required-asterisk">*</span>
          </label>
          <input
            id="legalName"
            type="text"
            formControlName="legalName"
            class="form-control"
            [class.error]="demographicsForm.get('legalName')?.invalid && demographicsForm.get('legalName')?.touched"
          />
          <div class="field-error" *ngIf="demographicsForm.get('legalName')?.invalid && demographicsForm.get('legalName')?.touched">
            Legal name is required
          </div>
        </div>

        <div class="form-group">
          <label for="preferredName" class="field-label">Preferred Name</label>
          <input
            id="preferredName"
            type="text"
            formControlName="preferredName"
            class="form-control"
          />
        </div>
      </div>
    </form>
  </div>

  <!-- Birth Section -->
  <app-section-header
    title="Birth"
    [collapsible]="true"
    [(collapsed)]="birthCollapsed"
    icon="fas fa-birthday-cake"
  ></app-section-header>
  
  <div class="form-section" *ngIf="!birthCollapsed">
    <form [formGroup]="demographicsForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="dateOfBirth" class="field-label">
            Date of Birth <span class="required-asterisk">*</span>
          </label>
          <div class="date-input-wrapper">
            <input
              id="dateOfBirth"
              type="date"
              formControlName="dateOfBirth"
              class="form-control"
              [class.error]="demographicsForm.get('dateOfBirth')?.invalid && demographicsForm.get('dateOfBirth')?.touched"
            />
            <i class="fas fa-calendar-alt date-icon"></i>
          </div>
          <div class="field-error" *ngIf="demographicsForm.get('dateOfBirth')?.invalid && demographicsForm.get('dateOfBirth')?.touched">
            Date of birth is required
          </div>
        </div>

        <div class="form-group">
          <label for="birthSex" class="field-label">
            Birth Sex <span class="required-asterisk">*</span>
          </label>
          <select
            id="birthSex"
            formControlName="birthSex"
            class="form-control"
            [class.error]="demographicsForm.get('birthSex')?.invalid && demographicsForm.get('birthSex')?.touched"
          >
            <option value="">Select...</option>
            <option value="MALE">Male</option>
            <option value="FEMALE">Female</option>
            <option value="INTERSEX">Intersex</option>
            <option value="UNKNOWN">Unknown</option>
          </select>
          <div class="field-error" *ngIf="demographicsForm.get('birthSex')?.invalid && demographicsForm.get('birthSex')?.touched">
            Birth sex is required
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- Gender Section -->
  <app-section-header
    title="Gender"
    [collapsible]="true"
    [(collapsed)]="genderCollapsed"
    icon="fas fa-venus-mars"
  ></app-section-header>
  
  <div class="form-section" *ngIf="!genderCollapsed">
    <form [formGroup]="demographicsForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="genderIdentity" class="field-label">Gender Identity</label>
          <select id="genderIdentity" formControlName="genderIdentity" class="form-control">
            <option value="">Select...</option>
            <option value="Woman">Woman</option>
            <option value="Man">Man</option>
            <option value="Non-binary">Non-binary</option>
            <option value="Other">Other</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>
      </div>
    </form>
  </div>

  <!-- Contact Section -->
  <app-section-header
    title="Contact"
    [collapsible]="true"
    [(collapsed)]="contactCollapsed"
    icon="fas fa-phone"
  ></app-section-header>
  
  <div class="form-section" *ngIf="!contactCollapsed">
    <form [formGroup]="demographicsForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="phone" class="field-label">
            Phone <span class="required-asterisk">*</span>
          </label>
          <input
            id="phone"
            type="tel"
            formControlName="phone"
            class="form-control"
            placeholder="(555) 123-4567"
            [class.error]="demographicsForm.get('phone')?.invalid && demographicsForm.get('phone')?.touched"
          />
          <div class="field-error" *ngIf="demographicsForm.get('phone')?.invalid && demographicsForm.get('phone')?.touched">
            Valid phone number is required
          </div>
        </div>

        <div class="form-group">
          <label for="email" class="field-label">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-control"
            placeholder="patient@example.com"
            [class.error]="demographicsForm.get('email')?.invalid && demographicsForm.get('email')?.touched"
          />
          <div class="field-error" *ngIf="demographicsForm.get('email')?.invalid && demographicsForm.get('email')?.touched">
            Valid email address required
          </div>
        </div>

        <div class="form-group full-width">
          <label for="address1" class="field-label">Address Line 1</label>
          <input
            id="address1"
            type="text"
            formControlName="address1"
            class="form-control"
            placeholder="Street address"
          />
        </div>

        <div class="form-group full-width">
          <label for="address2" class="field-label">Address Line 2</label>
          <input
            id="address2"
            type="text"
            formControlName="address2"
            class="form-control"
            placeholder="Apartment, suite, etc."
          />
        </div>

        <div class="form-group">
          <label for="city" class="field-label">City</label>
          <input
            id="city"
            type="text"
            formControlName="city"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="state" class="field-label">State</label>
          <input
            id="state"
            type="text"
            formControlName="state"
            class="form-control"
            maxlength="2"
            placeholder="IL"
          />
        </div>

        <div class="form-group">
          <label for="zip" class="field-label">ZIP Code</label>
          <input
            id="zip"
            type="text"
            formControlName="zip"
            class="form-control"
            placeholder="12345"
            maxlength="10"
            [class.error]="demographicsForm.get('zip')?.invalid && demographicsForm.get('zip')?.touched"
          />
          <div class="field-error" *ngIf="demographicsForm.get('zip')?.invalid && demographicsForm.get('zip')?.touched">
            Valid ZIP code required (12345 or 12345-6789)
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- Sticky Action Bar -->
  <div class="action-bar">
    <div class="action-bar-content">
      <button
        type="button"
        class="epic-btn epic-btn-secondary"
        (click)="cancel()"
        [disabled]="isSaving"
      >
        Cancel
      </button>
      <button
        type="button"
        class="epic-btn epic-btn-primary"
        (click)="save()"
        [disabled]="isSaving || !hasUnsavedChanges"
      >
        <i class="fas fa-save" *ngIf="!isSaving"></i>
        <span *ngIf="isSaving">Saving...</span>
        <span *ngIf="!isSaving">Save</span>
      </button>
    </div>
  </div>
</div>
