<div class="checkout-form">
  <h2 class="section-title">Checkout</h2>

  <div *ngIf="errorMessage" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
  </div>

  <form [formGroup]="checkoutForm" (ngSubmit)="save()">
    <!-- Follow-up Appointment -->
    <div class="form-section">
      <h3>Follow-up Appointment</h3>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="followUpAppointmentScheduled">
          Follow-up Appointment Scheduled
        </label>
      </div>
      <div class="form-group" *ngIf="checkoutForm.get('followUpAppointmentScheduled')?.value">
        <label for="followUpDate">Follow-up Date</label>
        <input id="followUpDate" type="datetime-local" formControlName="followUpDate" class="form-control">
      </div>
      <div class="form-group" *ngIf="checkoutForm.get('followUpAppointmentScheduled')?.value">
        <label for="followUpReason">Follow-up Reason</label>
        <textarea id="followUpReason" formControlName="followUpReason" rows="2" class="form-control" placeholder="Enter follow-up reason"></textarea>
      </div>
    </div>

    <!-- Referrals -->
    <div class="form-section">
      <h3>Referrals</h3>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="referralsMade">
          Referrals Made
        </label>
      </div>
      <div class="form-grid" *ngIf="checkoutForm.get('referralsMade')?.value">
        <div class="form-group">
          <label for="referralSpecialty">Specialty</label>
          <input id="referralSpecialty" type="text" formControlName="referralSpecialty" class="form-control" placeholder="Enter specialty">
        </div>
        <div class="form-group">
          <label for="referralProviderName">Provider Name</label>
          <input id="referralProviderName" type="text" formControlName="referralProviderName" class="form-control" placeholder="Enter provider name">
        </div>
        <div class="form-group full-width">
          <label for="referralNotes">Referral Notes</label>
          <textarea id="referralNotes" formControlName="referralNotes" rows="3" class="form-control" placeholder="Enter referral notes"></textarea>
        </div>
      </div>
    </div>

    <!-- Patient Instructions -->
    <div class="form-section">
      <h3>Patient Instructions</h3>
      <div class="form-group">
        <label for="patientInstructions">General Instructions</label>
        <textarea id="patientInstructions" formControlName="patientInstructions" rows="4" class="form-control" placeholder="Enter general instructions"></textarea>
      </div>
      <div class="form-group">
        <label for="medicationInstructions">Medication Instructions</label>
        <textarea id="medicationInstructions" formControlName="medicationInstructions" rows="3" class="form-control" placeholder="Enter medication instructions"></textarea>
      </div>
      <div class="form-group">
        <label for="activityRestrictions">Activity Restrictions</label>
        <textarea id="activityRestrictions" formControlName="activityRestrictions" rows="2" class="form-control" placeholder="Enter activity restrictions"></textarea>
      </div>
      <div class="form-group">
        <label for="dietInstructions">Diet Instructions</label>
        <textarea id="dietInstructions" formControlName="dietInstructions" rows="2" class="form-control" placeholder="Enter diet instructions"></textarea>
      </div>
      <div class="form-group">
        <label for="whenToReturn">When to Return</label>
        <textarea id="whenToReturn" formControlName="whenToReturn" rows="2" class="form-control" placeholder="Enter when to return"></textarea>
      </div>
    </div>

    <!-- Billing -->
    <div class="form-section">
      <h3>Billing & Payment</h3>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="billingCaptured">
          Billing Captured
        </label>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="copayCollected">
          Copay Collected
        </label>
      </div>
      <div class="form-grid" *ngIf="checkoutForm.get('copayCollected')?.value">
        <div class="form-group">
          <label for="copayAmount">Copay Amount ($)</label>
          <input id="copayAmount" type="number" step="0.01" formControlName="copayAmount" class="form-control" placeholder="0.00">
        </div>
        <div class="form-group">
          <label for="paymentMethod">Payment Method</label>
          <select id="paymentMethod" formControlName="paymentMethod" class="form-control">
            <option value="">Select...</option>
            <option value="Cash">Cash</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
            <option value="Check">Check</option>
            <option value="Insurance">Insurance</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Discharge -->
    <div class="form-section">
      <h3>Discharge</h3>
      <div class="form-group">
        <label for="dischargeDisposition">Discharge Disposition</label>
        <select id="dischargeDisposition" formControlName="dischargeDisposition" class="form-control">
          <option value="">Select...</option>
          <option value="Home">Home</option>
          <option value="Hospital">Hospital</option>
          <option value="Skilled Nursing">Skilled Nursing</option>
          <option value="Rehabilitation">Rehabilitation</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="dischargeInstructionsProvided">
          Discharge Instructions Provided
        </label>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" formControlName="patientUnderstoodInstructions">
          Patient Understood Instructions
        </label>
      </div>
    </div>

    <!-- Notes -->
    <div class="form-section">
      <h3>Additional Notes</h3>
      <div class="form-group">
        <label for="notes">Additional Notes</label>
        <textarea id="notes" formControlName="notes" rows="4" class="form-control" placeholder="Enter additional notes"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="submit" class="epic-btn epic-btn-primary" [disabled]="isLoading || checkoutForm.invalid">
        <i class="fas fa-save"></i> Save Checkout
      </button>
      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
    </div>
  </form>
</div>
