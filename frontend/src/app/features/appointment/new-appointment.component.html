<div class="new-appointment-page">
  <div class="page-header">
    <h2 class="page-title">
      <span *ngIf="isViewMode">View Appointment</span>
      <span *ngIf="isEditMode && !isViewMode">Edit Appointment</span>
      <span *ngIf="!isEditMode && !isViewMode">New Appointment</span>
    </h2>
  </div>

  <div class="appointment-form-container">
    <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="appointment-form">
      
      <!-- Appointment ID -->
      <div class="form-group">
        <label class="form-label">Appointment ID*</label>
        <div class="input-with-action">
          <input 
            type="text" 
            class="form-control" 
            formControlName="appointmentId" 
            required
            readonly
            placeholder="Auto-generated">
          <button 
            type="button"
            class="btn-icon"
            (click)="generateAppointmentId()"
            title="Regenerate ID">
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>

      <!-- Patient Selection -->
      <div class="form-group">
        <label class="form-label">Patient*</label>
        <div class="select-with-button">
          <select class="form-control" formControlName="patientId" required>
            <option value="">Select</option>
            <option *ngFor="let patient of patients" [value]="patient.id">
              {{ patient.firstName }} {{ patient.lastName }}
            </option>
          </select>
          <button 
            type="button"
            class="btn-add-new"
            (click)="openAddPatientDialog()">
            Add New
          </button>
        </div>
      </div>

      <!-- Department -->
      <div class="form-group">
        <label class="form-label">Department*</label>
        <select class="form-control" formControlName="departmentId" required>
          <option value="">Select</option>
          <option *ngFor="let dept of departments" [value]="dept.id ?? dept.departmentId">
            {{ dept.name }}
          </option>
        </select>
      </div>

      <!-- Doctor -->
      <div class="form-group">
        <label class="form-label">Doctor*</label>
        <select 
          class="form-control" 
          formControlName="doctorId" 
          required 
          [disabled]="!appointmentForm.get('departmentId')?.value">
          <option value="">Select</option>
          <option *ngIf="!appointmentForm.get('departmentId')?.value" disabled>
            Please select a department first
          </option>
          <option *ngIf="appointmentForm.get('departmentId')?.value && filteredDoctors.length === 0 && doctors.length === 0" disabled>
            Loading doctors...
          </option>
          <option *ngIf="appointmentForm.get('departmentId')?.value && filteredDoctors.length === 0 && doctors.length > 0" disabled>
            No doctors available
          </option>
          <option *ngFor="let doctor of filteredDoctors" [value]="doctor.id">
            Dr. {{ doctor.firstName }} {{ doctor.lastName }}
            <span *ngIf="doctor.specializations && doctor.specializations.length > 0">
              - {{ getSpecializationName(doctor.specializations[0]) }}
            </span>
          </option>
        </select>
      </div>

      <!-- Appointment Type -->
      <div class="form-group">
        <label class="form-label">Appointment Type*</label>
        <select class="form-control" formControlName="appointmentType" required>
          <option value="">Select</option>
          <option *ngFor="let type of appointmentTypes" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>

      <!-- Date of Appointment -->
      <div class="form-group">
        <label class="form-label">Date of Appointment*</label>
        <input 
          type="date" 
          class="form-control" 
          formControlName="appointmentDate" 
          required>
      </div>

      <!-- Time -->
      <div class="form-group">
        <label class="form-label">Time*</label>
        <input 
          type="time" 
          class="form-control" 
          formControlName="appointmentTime" 
          required>
      </div>

      <!-- Appointment Reason -->
      <div class="form-group">
        <label class="form-label">Appointment Reason*</label>
        <textarea 
          class="form-control" 
          formControlName="appointmentReason" 
          rows="4" 
          required
          placeholder="Enter appointment reason"></textarea>
      </div>

      <!-- Status -->
      <div class="form-group">
        <label class="form-label">Status*</label>
        <select class="form-control" formControlName="status" required>
          <option value="">Select</option>
          <option *ngFor="let status of appointmentStatuses" [value]="status">
            {{ status }}
          </option>
        </select>
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        {{ errorMessage }}
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button 
          type="button"
          class="btn btn-cancel"
          (click)="onCancel()">
          Cancel
        </button>
        <button 
          type="submit"
          class="btn btn-primary"
          [disabled]="appointmentForm.invalid || isLoading || isViewMode"
          *ngIf="!isViewMode">
          <i class="fas fa-plus" *ngIf="!isLoading && !isEditMode"></i>
          <i class="fas fa-save" *ngIf="!isLoading && isEditMode"></i>
          <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
          <span *ngIf="isLoading && isEditMode">Updating...</span>
          <span *ngIf="isLoading && !isEditMode">Creating...</span>
          <span *ngIf="!isLoading && isEditMode">Update Appointment</span>
          <span *ngIf="!isLoading && !isEditMode">Create Appointment</span>
        </button>
      </div>
    </form>
  </div>
</div>
