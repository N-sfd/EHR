<div class="records-page" *ngIf="!isLoading; else loadingTpl">
  <div class="page-header">
    <div>
      <h1><i class="fas fa-file-medical"></i> Health Records</h1>
      <p class="subtitle">View and download your medical records</p>
    </div>
    <a routerLink="/patient/home" class="btn-back">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>

  <div class="empty-state" *ngIf="records.length === 0">
    <i class="fas fa-folder-open"></i>
    <h3>No health records found</h3>
    <p>Your medical records will appear here when available.</p>
  </div>

  <div class="records-list" *ngIf="records.length > 0">
    <div class="record-card" *ngFor="let record of records">
      <div class="record-icon">
        <i class="fas fa-file-pdf"></i>
      </div>
      <div class="record-info">
        <div class="record-name">{{ record.name || 'Medical Record' }}</div>
        <div class="record-meta">
          <span *ngIf="record.date"><i class="fas fa-calendar"></i> {{ record.date | date }}</span>
          <span *ngIf="record.type"><i class="fas fa-tag"></i> {{ record.type }}</span>
        </div>
      </div>
      <button class="btn-download" (click)="downloadRecord(record)" *ngIf="record.fileUrl">
        <i class="fas fa-download"></i> Download
      </button>
    </div>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="loading-state">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading health records...</p>
  </div>
</ng-template>
