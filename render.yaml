# Render Blueprint for the EHR Spring Boot backend + PostgreSQL.
# Deploy: push to GitHub, then in Render -> "New" -> "Blueprint" and point it at this repo.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: ehr-postgres
    databaseName: staff_db
    # Render reserves "postgres"; it auto-generates a user, which we read via DB_USER below.
    plan: free # NOTE: Render's free Postgres is deleted after ~30 days; upgrade for anything real.

services:
  - type: web
    name: ehr-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      # Database connection is composed from these in application-docker.yml
      - key: DB_HOST
        fromDatabase:
          name: ehr-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ehr-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ehr-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: ehr-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ehr-postgres
          property: password
      # HTTPS in production -> Secure session cookies
      - key: APP_COOKIE_SECURE
        value: "true"
      - key: EPIC_SMART_COOKIE_SECURE
        value: "true"
      # Set to your Cloudflare Pages URL once known (used for SMART on FHIR redirects). Optional.
      - key: EPIC_SMART_FRONTEND_BASE_URL
        sync: false

      # --- One-time database reset -----------------------------------------------------
      # The DB was left inconsistent by an earlier partially-applied migration (a legacy
      # patients.mrn NOT NULL column that blocks inserts). Set this to "true" ONCE in the
      # Render dashboard, redeploy so Hibernate rebuilds a clean schema, then set it back
      # to "false". WARNING: enabling this deletes ALL data in the database.
      - key: EHR_DB_RESET_SCHEMA
        value: "false"

      # --- AI (cloud OpenAI) -----------------------------------------------------------
      # Render cannot reach a local Ollama, so the hosted site uses OpenAI. Paste your key
      # (OPENAI_API_KEY) in the Render dashboard; until then AI stays off and the app runs
      # normally. No key = assistant shows the "AI not configured" message.
      - key: EHR_AI_ENABLED
        value: "true"
      - key: EHR_AI_STREAMING
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
