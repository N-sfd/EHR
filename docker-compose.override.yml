# Local-only overrides for testing (not used by Render). Safe to delete.
# Exposes the API on localhost:8087 and enables AI via the host's local Ollama.
#
# Requires Ollama running on the host: `ollama serve` + `ollama pull llama3`.
# The container reaches the host Ollama through host.docker.internal (Docker Desktop).
services:
  api:
    ports:
      - "8087:8087"
    # host.docker.internal lets the container reach Ollama running on the Windows/Mac host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # docker profile = DB/datasource; ollama profile disables pgvector so no embedding model is needed.
      SPRING_PROFILES_ACTIVE: "docker,ollama"
      EHR_AI_ENABLED: "true"
      EHR_AI_OLLAMA: "true"
      EHR_AI_STREAMING: "true"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_CHAT_MODEL: "llama3"
